version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: nest_postgres
    restart: always
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpass
      POSTGRES_DB: gitwrapped_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: nest_api
    restart: always
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:  
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nestuser
      DB_PASS: nestpass
      DB_NAME: gitwrapped_db
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata: