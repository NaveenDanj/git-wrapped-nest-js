services:
  postgres:
    image: postgres:16
    container_name: nest_postgres
    restart: always
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpass
      POSTGRES_DB: gitwrapped_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nest_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: nest_api
    restart: always
    depends_on:
      - postgres
      - redis

    ports:
      - "3000:3000"

    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: nestuser
      DATABASE_PASSWORD: nestpass
      DATABASE_NAME: gitwrapped_db

      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata: